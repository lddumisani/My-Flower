<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blooming Flowers</title>

<style>
body{
margin:0;
height:100vh;
background:linear-gradient(to bottom,#ffe6f0,#fff);
overflow:hidden;
cursor:pointer;
font-family:sans-serif;
}

/* POPUP */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:flex;
align-items:center;
justify-content:center;
}

.popup-box{
background:white;
padding:30px;
border-radius:12px;
text-align:center;
max-width:300px;
}

.popup-box h2{
color:#d63384;
}

.popup-box button{
padding:10px 20px;
border:none;
background:#ff4da6;
color:white;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

/* FLOWERS */
.flower{
position:absolute;
font-size:38px;
pointer-events:none;
animation:bloom 0.6s ease-out, floatUp 4s linear forwards;
}

@keyframes bloom{
0%{
transform:scale(0);
opacity:0;
}
70%{
transform:scale(1.4);
opacity:1;
}
100%{
transform:scale(1);
}
}

@keyframes floatUp{
0%{ transform:translateY(0); }
100%{
transform:translateY(-200px);
opacity:0;
}
}

.message{
position:absolute;
top:20px;
width:100%;
text-align:center;
font-size:22px;
color:#d63384;
}
</style>

</head>

<body>

<div class="message">Click anywhere to grow flowers 🌸</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-box">
<h2>Hello 🌸</h2>
<p>Click the screen and watch the flowers bloom.</p>
<button onclick="start()">Start</button>
</div>
</div>

<script>

const flowers = ["🌸","🌺","🌷","🌹","🌻"];

function start(){
document.getElementById("popup").style.display = "none";
}

document.addEventListener("click", function(e){

if(document.getElementById("popup").style.display !== "none"){
return;
}

for(let i=0;i<3;i++){

const flower = document.createElement("div");
flower.classList.add("flower");

flower.innerHTML = flowers[Math.floor(Math.random()*flowers.length)];

flower.style.left = (e.pageX + (Math.random()*40 - 20)) + "px";
flower.style.top = (e.pageY + (Math.random()*40 - 20)) + "px";

flower.style.fontSize = (30 + Math.random()*30) + "px";

document.body.appendChild(flower);

setTimeout(()=>{
flower.remove();
},4000);
}

});

</script>

</body>
</html>
